services:
  backend:
    image: 971598352774.dkr.ecr.ap-south-1.amazonaws.com/expense-backend:latest
    environment:
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: ExpenseApp@1
    command: sh -c "sleep 30 && node /opt/backend/index.js"
    networks:
      - expense
    container_name: backend
    depends_on:
      - mysql

  mysql:
    image: 971598352774.dkr.ecr.ap-south-1.amazonaws.com/expense-mysql:latest
    restart: always
    networks:
      - expense
    container_name: mysql
    volumes:
      - mysql:/var/lib/mysql

  frontend:
    image: 971598352774.dkr.ecr.ap-south-1.amazonaws.com/expense-frontend:latest
    networks:
      - expense
    container_name: frontend
    ports:
      - "80:80"
    depends_on:
      - backend

networks:
  expense:

volumes:
  mysql: