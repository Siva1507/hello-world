services:
  backend:
    image: 971598352774.dkr.ecr.ap-south-1.amazonaws.com/expense-backend:${IMAGE_TAG}
    container_name: backend
    restart: unless-stopped

    environment:
      DB_HOST: ${DB_HOST}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}

    depends_on:
      - mysql

    networks:
      - expense

  mysql:
    image: 971598352774.dkr.ecr.ap-south-1.amazonaws.com/expense-mysql:${IMAGE_TAG}
    container_name: mysql
    restart: always

    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-uroot",
          "-p${DB_PASSWORD}"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

    volumes:
      - mysql:/var/lib/mysql

    networks:
      - expense

  frontend:
    image: 971598352774.dkr.ecr.ap-south-1.amazonaws.com/expense-frontend:${IMAGE_TAG}
    container_name: frontend
    restart: unless-stopped

    depends_on:
      - backend

    networks:
      - expense

  nginx:
    image: nginx:1.28-alpine
    container_name: nginx
    restart: unless-stopped

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro

    depends_on:
      - frontend
      - backend

    networks:
      - expense

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped

    ports:
      - "9100:9100"

    command:
      - "--path.rootfs=/host"

    pid: host

    volumes:
      - "/:/host:ro,rslave"

    networks:
      - expense

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped

    ports:
      - "9090:9090"

    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

    command:
      - "--config.file=/etc/prometheus/prometheus.yml"

    depends_on:
      - node-exporter

    networks:
      - expense
  grafana:
    image: grafana/grafana-oss:latest
    container_name: grafana
    restart: unless-stopped

    ports:
      - "3000:3000"

    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123

    volumes:
      - grafana_data:/var/lib/grafana

    depends_on:
      - prometheus

    networks:
      - expense
networks:
  expense:

volumes:
  mysql:
  grafana_data: