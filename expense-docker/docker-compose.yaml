services:
  backend:
    image: 971598352774.dkr.ecr.ap-south-1.amazonaws.com/expense-backend:${IMAGE_TAG}
    container_name: backend
    restart: unless-stopped

    environment:
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: ExpenseApp@1

    depends_on:
      - mysql

    networks:
      - expense

  mysql:
    image: 971598352774.dkr.ecr.ap-south-1.amazonaws.com/expense-mysql:${IMAGE_TAG}
    container_name: mysql
    restart: always

    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-uroot",
          "-pExpenseApp@1"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

    volumes:
      - mysql:/var/lib/mysql

    networks:
      - expense

  frontend:
    image: 971598352774.dkr.ecr.ap-south-1.amazonaws.com/expense-frontend:${IMAGE_TAG}
    container_name: frontend
    restart: unless-stopped

    depends_on:
      - backend

    networks:
      - expense

  nginx:
    image: nginx:1.28-alpine
    container_name: nginx
    restart: unless-stopped

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro

    depends_on:
      - frontend
      - backend

    networks:
      - expense

networks:
  expense:

volumes:
  mysql: