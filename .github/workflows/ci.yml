name: Expense App CI

on:
  push:
    branches:
      - main

jobs:
  docker-build-and-push:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: ap-south-1
      AWS_ACCOUNT_ID: 971598352774

    defaults:
      run:
        working-directory: expense-docker

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4


      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}


      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2


      # ---------------- Backend ----------------

      - name: Build Backend Image
        run: |
          docker build -t expense-backend ./backend


      - name: Tag Backend Image
        run: |
          docker tag expense-backend:latest \
          ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/expense-backend:latest


      - name: Push Backend Image
        run: |
          docker push \
          ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/expense-backend:latest



      # ---------------- Frontend ----------------

      - name: Build Frontend Image
        run: |
          docker build -t expense-frontend ./frontend


      - name: Tag Frontend Image
        run: |
          docker tag expense-frontend:latest \
          ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/expense-frontend:latest


      - name: Push Frontend Image
        run: |
          docker push \
          ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/expense-frontend:latest



      # ---------------- MySQL ----------------

      - name: Build MySQL Image
        run: |
          docker build -t expense-mysql ./mysql


      - name: Tag MySQL Image
        run: |
          docker tag expense-mysql:latest \
          ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/expense-mysql:latest


      - name: Push MySQL Image
        run: |
          docker push \
          ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/expense-mysql:latest



      # ---------------- Deployment ----------------

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/hello-world/expense-docker
            docker compose pull
            docker compose up -d